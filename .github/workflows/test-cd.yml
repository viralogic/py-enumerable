name: Test Continuous Deployment

on:
  push:
    branches:
      - 'release/*'
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10"]
    steps:
    - uses: actions/checkout@v2
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v1
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install uv and dependencies
      run: |
        pip install -U pip
        pip install uv
        uv sync
    - name: Lint with flake8
      run: uv run flake8 .
    - name: Test with pytest
      run: uv run pytest tests --cov=py_linq --cov-branch --cov-report term
    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v3
  deploy:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8"]
    steps:
    - uses: actions/checkout@v2
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v1
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install uv and dependencies
      run: |
        pip install -U pip
        pip install uv
        uv sync
    - name: Build and publish (dry run)
      run: |
        uv build
        uv publish --username ${{ secrets.PYPI_USERNAME }} --password ${{ secrets.PYPI_PASSWORD }} --dry-run
